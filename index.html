function getDailyTip(){
  const d=new Date(),start=new Date(d.getFullYear(),0,0);
  const day=Math.floor((d-start)/86400000);
  return DAILY_TIPS[day%DAILY_TIPS.length];
}

// ── Chicken Calc ───────────────────────────────────────────────────────────
function calcBatch(b){
  const dOld=Math.max(0,dBetween(b.startDate,today()));
  const alive=(b.numBirds||0)-(b.mortality||0);
  const phases=FP.map((p,i)=>{
    const d=Math.min(dOld,p.dayEnd)-Math.max(0,p.dayStart-1);
    const kg=(Math.max(0,d)*p.gpb*(b.numBirds||0))/1000;
    const price=[b.priceStarter||32,b.priceGrower||30,b.priceFinisher||28][i];
    return{...p,kg,cost:(kg/50)*price};
  });
  const feedCost=phases.reduce((s,p)=>s+p.cost,0);
  const chickCost=(b.numBirds||0)*(b.costPerChick||0.75);
  const other=parseFloat(b.otherCosts)||0;
  const totalCost=feedCost+chickCost+other;
  const revenue=alive*(b.avgWeight||2)*(b.salePrice||4.5);
  const profit=revenue-totalCost;
  const cp=dOld>=29?FP[2]:dOld>=15?FP[1]:FP[0];
  const dlp=cp.dayEnd-dOld;
  return{dOld,alive,phases,feedCost,chickCost,other,totalCost,revenue,profit,cp,dlp,mortalityPct:(((b.mortality||0)/(b.numBirds||1))*100).toFixed(1)};
}

// ── Smart Alerts Generator ─────────────────────────────────────────────────
function generateSmartAlerts(batches,cBatches,events,fertLogs){
  const alerts=[];
  const t=today();

  batches.forEach(b=>{
    const meta=CM[b.crop]||{};
    const dOld=dBetween(b.planted,t);
    const dToHarvest=dBetween(t,b.harvest);
    const bEvt=events.filter(e=>e.batchId===b.id);
    const label=`${meta.icon} ${b.crop}${b.bed?` (${b.bed})`:""}`;

    // Overdue harvest
    if(dToHarvest<0&&dToHarvest>-14){
      alerts.push({id:`oharvest-${b.id}`,icon:"⚠️",col:"#DC2626",bg:"#FEF2F2",title:`${b.crop} overdue for harvest`,desc:`${label} — ${Math.abs(dToHarvest)}d past harvest date`,pri:0});
    }
    // Harvest due soon
    if(dToHarvest>=0&&dToHarvest<=7){
      alerts.push({id:`harvest-${b.id}`,icon:"⚖️",col:"#D97706",bg:"#FFFBEB",title:`Harvest ${b.crop} soon`,desc:`${label} — ready in ${dToHarvest===0?"today!":dToHarvest+"d"}`,pri:dToHarvest<=2?0:1});
    }
    // Weeding due (every 14 days after planting)
    if(dOld>7){
      const lastWeed=bEvt.filter(e=>e.type==="weeding").sort((a,z)=>z.date>a.date?1:-1)[0];
      const sinceWeed=lastWeed?dBetween(lastWeed.date,t):dOld;
      if(sinceWeed>=14){
        alerts.push({id:`weed-${b.id}`,icon:"🌿",col:"#16A34A",bg:"#F0FDF4",title:`Weed ${b.crop}`,desc:`${label} — ${lastWeed?`last weeded ${sinceWeed}d ago`:"not weeded yet"}`,pri:sinceWeed>=21?0:1});
      }
    }
    // Irrigation overdue
    const lastW=bEvt.filter(e=>e.type==="irrigation").sort((a,z)=>z.date>a.date?1:-1)[0];
    const maxIrr=IRR_DAYS[b.irrigation]||2;
    const sinceW=lastW?dBetween(lastW.date,t):dOld;
    if(sinceW>maxIrr&&dOld>0){
      alerts.push({id:`water-${b.id}`,icon:"💧",col:"#2563EB",bg:"#EFF6FF",title:`Water ${b.crop}`,desc:`${label} — not watered for ${sinceW}d (schedule: ${b.irrigation})`,pri:sinceW>maxIrr*2?0:1});
    }
    // Fertilization due
    const weeksOld=wBetween(b.planted,t);
    (FERT[b.crop]||[]).forEach(fs=>{
      const logged=fertLogs.some(l=>l.batchId===b.id&&l.fertId===fs.id);
      if(!logged&&weeksOld>=fs.week){
        alerts.push({id:`fert-${b.id}-${fs.id}`,icon:"🧪",col:"#7C3AED",bg:"#F5F3FF",title:`Apply ${fs.name}`,desc:`${label} — ${fs.purpose}`,pri:weeksOld>=fs.week+1?0:1});
      }
    });
  });

  // Chicken alerts
  cBatches.filter(b=>!b.sold).forEach(b=>{
    const{dOld,dlp,cp}=calcBatch(b);
    if(dlp>=0&&dlp<=3&&cp.id<2){
      alerts.push({id:`feed-${b.id}`,icon:"🌾",col:cp.color,bg:cp.bg,title:`Switch to ${FP[cp.id+1]?.name}`,desc:`🐔 ${b.name||"Chicken Batch"} — ${dlp===0?"Switch TODAY!":dlp===1?"Switch TOMORROW!":`Switch in ${dlp} days`}`,pri:dlp===0?0:1});
    }
    if(dOld>=40){
      alerts.push({id:`slaughter-${b.id}`,icon:"✅",col:"#D97706",bg:"#FFFBEB",title:"Chickens ready for slaughter",desc:`🐔 ${b.name||"Batch"} — Day ${dOld}. Plan harvest and contact buyers.`,pri:0});
    }
  });

  return alerts.sort((a,b)=>a.pri-b.pri).slice(0,10);
}

// ── Weather ────────────────────────────────────────────────────────────────
const WI={0:"☀️",1:"🌤",2:"⛅",3:"☁️",45:"🌫",51:"🌦",53:"🌦",61:"🌧",63:"🌧",65:"🌧",80:"🌦",81:"🌧",95:"⛈"};
const WT={0:"Clear sky",1:"Mainly clear",2:"Partly cloudy",3:"Overcast",45:"Foggy",51:"Light drizzle",53:"Drizzle",61:"Light rain",63:"Rain",65:"Heavy rain",80:"Showers",95:"Thunderstorm"};

function getDailyBriefing(current,daily){
  const maxT=Math.round(daily.temperature_2m_max[0]),rain=daily.precipitation_sum[0],rh=current.relative_humidity_2m,code=daily.weathercode[0];
  if(rain>10)return{icon:"⛈",col:"#7C3AED",text:`Heavy rain (${rain}mm) — skip irrigation, check drainage.`};
  if(rain>3)return{icon:"🌧",col:"#2563EB",text:`${rain}mm of rain expected — hold off watering today.`};
  if(maxT>36)return{icon:"🔥",col:"#DC2626",text:`Extreme heat (${maxT}°C) — water before 7am, double chicken water.`};
  if(maxT>32)return{icon:"🌡️",col:"#EA580C",text:`Hot day (${maxT}°C) — mulch beds and watch for heat stress.`};
  if(rh>85&&maxT>22)return{icon:"🍄",col:"#B45309",text:`High humidity — check crops for fungal disease today.`};
  if(code<=1&&maxT>=18&&maxT<=30)return{icon:"🌟",col:"#16A34A",text:`Perfect farming day (${maxT}°C) — great for field work.`};
  return{icon:"🌤",col:"#374151",text:`Mild conditions (${maxT}°C) — good day for general farm tasks.`};
}

// ── Shared UI ──────────────────────────────────────────────────────────────
const IS={width:"100%",padding:"11px 14px",borderRadius:12,border:"1.5px solid #E5E7EB",background:"#fff",fontSize:14,color:"#1F2937",boxSizing:"border-box",fontFamily:"inherit"};
const BS={padding:"13px 18px",borderRadius:14,border:"none",background:"linear-gradient(135deg,#16A34A,#0F3D1F)",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",boxShadow:"0 4px 14px rgba(15,61,31,.28)"};

function Toast({msg,type}){
  const bg=type==="success"?"#16A34A":type==="info"?"#D97706":"#DC2626";
  return<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",zIndex:999,background:bg,color:"#fff",borderRadius:14,padding:"11px 22px",fontSize:13,fontWeight:600,boxShadow:"0 6px 24px rgba(0,0,0,.2)",whiteSpace:"nowrap"}}>{msg}</div>;
}

function Modal({title,onClose,children}){
  return(
    <div onClick={e=>e.target===e.currentTarget&&onClose()} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(3px)"}}>
      <div style={{background:"#F8FAF8",width:"100%",maxWidth:480,borderRadius:"24px 24px 0 0",maxHeight:"92vh",overflowY:"auto",padding:"20px 18px 48px",animation:"slideUp .25s ease"}}>
        <div style={{width:40,height:4,background:"#D1D5DB",borderRadius:99,margin:"0 auto 20px"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <h3 style={{margin:0,fontSize:19,fontWeight:800,color:"#111827"}}>{title}</h3>
          <button onClick={onClose} style={{background:"#F3F4F6",border:"none",borderRadius:50,width:32,height:32,cursor:"pointer",fontSize:15,color:"#6B7280",display:"flex",alignItems:"center",justifyContent:"center"}}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Field({label,children,style}){
  return(
    <div style={{marginBottom:14,...style}}>
      <label style={{display:"block",fontSize:11,fontWeight:700,color:"#374151",marginBottom:5,textTransform:"uppercase",letterSpacing:.5}}>{label}</label>
      {children}
    </div>
  );
}

function TeamPicker({value,onChange}){
  return<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{TEAM.map(n=><button key={n} onClick={()=>onChange(n)} style={{padding:"8px 16px",borderRadius:99,border:"none",cursor:"pointer",fontSize:13,fontWeight:600,background:value===n?"#0F3D1F":"#F3F4F6",color:value===n?"#fff":"#6B7280"}}>{n}</button>)}</div>;
}

function GrowthBar({planted,harvest}){
  const t=today(),total=dBetween(planted,harvest),elapsed=dBetween(planted,t);
  const pct=Math.min(100,Math.max(0,(elapsed/total)*100)),od=elapsed>total;
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#6B7280",marginBottom:5}}>
        <span>{fmtS(planted)}</span>
        <span style={{color:od?"#DC2626":"#374151",fontWeight:od?700:500}}>{od?"⚠ Overdue":`${Math.max(0,total-elapsed)}d left`}</span>
      </div>
      <div style={{background:"#E5E7EB",borderRadius:99,height:8,overflow:"hidden"}}>
        <div style={{width:`${pct}%`,height:"100%",borderRadius:99,background:od?"linear-gradient(90deg,#DC2626,#EF4444)":"linear-gradient(90deg,#22C55E,#C8963A)"}}/>
      </div>
      <div style={{fontSize:10,color:"#9CA3AF",marginTop:3}}>Harvest: {fmtS(harvest)}</div>
    </div>
  );
}

function FeedBar({dOld}){
  return(
    <div>
      <div style={{display:"flex",gap:2,borderRadius:99,overflow:"hidden",height:16,marginBottom:5}}>
        {FP.map((p,i)=>{const w=((p.dayEnd-p.dayStart+1)/42*100)+"%",active=dOld>=p.dayStart-1&&dOld<=p.dayEnd,done=dOld>p.dayEnd;return<div key={i} style={{width:w,background:done||active?p.color:"#E5E7EB",opacity:active?1:done?.55:.3,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:8,fontWeight:700,color:done||active?"#fff":"#9CA3AF"}}>{p.short}</span></div>;})}
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#9CA3AF"}}><span>Day 1</span><span>Day 14</span><span>Day 28</span><span>Day 42</span></div>
    </div>
  );
}

function FertSchedule({batch,logs,onLog}){
  const sched=FERT[batch.crop]||[];
  const weeksOld=wBetween(batch.planted,today());
  return(
    <div style={{marginTop:12}}>
      <div style={{fontSize:11,fontWeight:700,color:"#7C3AED",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>🧪 Fertilization Schedule</div>
      {sched.map(s=>{
        const isDue=weeksOld>=s.week,isLogged=logs.some(l=>l.batchId===batch.id&&l.fertId===s.id);
        const daysUntil=(s.week*7)-dBetween(batch.planted,today()),isOD=isDue&&!isLogged;
        return(
          <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,padding:"9px 11px",borderRadius:11,marginBottom:6,background:isLogged?"#F0FDF4":isOD?"#FEF2F2":"#F9FAFB",border:`1.5px solid ${isLogged?"#BBF7D0":isOD?"#FECACA":"#F3F4F6"}`}}>
            <div style={{width:26,height:26,borderRadius:7,background:isLogged?"#16A34A":isOD?"#DC2626":"#E5E7EB",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:12}}>{isLogged?"✓":isOD?"!":"📅"}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:700,color:"#1F2937"}}>{s.name}</div>
              <div style={{fontSize:11,color:"#6B7280"}}>{s.purpose} · {s.rate}</div>
              <div style={{fontSize:10,color:isOD?"#DC2626":isDue?"#16A34A":"#9CA3AF",fontWeight:600,marginTop:1}}>{isLogged?"✓ Done":isOD?"Overdue!":daysUntil<=7&&daysUntil>0?`Due in ${daysUntil}d`:`Week ${s.week}`}</div>
            </div>
            <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:99,background:s.type==="Basal"?"#EDE9FE":"#E0F2FE",color:s.type==="Basal"?"#7C3AED":"#0284C7",flexShrink:0}}>{s.type}</span>
            {!isLogged&&isDue&&<button onClick={()=>onLog(batch.id,s.id,s.name)} style={{background:"#0F3D1F",color:"#fff",border:"none",borderRadius:8,padding:"5px 9px",fontSize:11,fontWeight:700,cursor:"pointer",flexShrink:0}}>Log</button>}
          </div>
        );
      })}
    </div>
  );
}

// ── CropCard ───────────────────────────────────────────────────────────────
function CropCard({b,events,fertLogs,onLogEvent,onLogFert}){
  const[showFert,setShowFert]=useState(false);
  const meta=CM[b.crop]||{};
  const bEvt=events.filter(e=>e.batchId===b.id);
  const lastW=bEvt.filter(e=>e.type==="irrigation").sort((a,z)=>z.date>a.date?1:-1)[0];
  const lastWeed=bEvt.filter(e=>e.type==="weeding").sort((a,z)=>z.date>a.date?1:-1)[0];
  const harvested=bEvt.filter(e=>e.type==="harvest").reduce((s,e)=>s+(parseFloat(e.quantity)||0),0);
  return(
    <div className="fade" style={{background:"#fff",borderRadius:20,overflow:"hidden",marginBottom:14,boxShadow:"0 4px 16px rgba(0,0,0,.07)"}}>
      <div style={{background:meta.grad||"#16A34A",padding:"12px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:22}}>{meta.icon}</span>
          <div>
            <div style={{fontSize:15,fontWeight:800,color:"#fff"}}>{b.crop}</div>
            {b.variety&&<div style={{fontSize:11,color:"rgba(255,255,255,.75)"}}>{b.variety}</div>}
          </div>
        </div>
        <button onClick={()=>onLogEvent(b.id)} style={{background:"rgba(255,255,255,.2)",color:"#fff",border:"1px solid rgba(255,255,255,.3)",borderRadius:10,padding:"6px 12px",fontSize:12,fontWeight:700,cursor:"pointer"}}>Log →</button>
      </div>
      <div style={{padding:"12px 14px"}}>
        {b.bed&&<div style={{display:"inline-flex",alignItems:"center",gap:3,background:meta.bg,borderRadius:99,padding:"3px 10px",fontSize:11,color:meta.color,fontWeight:700,marginBottom:10}}>📍{b.bed}{b.area?` · ${b.area}m²`:""}</div>}
        <GrowthBar planted={b.planted} harvest={b.harvest}/>
        <div style={{display:"flex",gap:6,marginTop:10,flexWrap:"wrap"}}>
          {lastW?<span style={{color:"#2563EB",background:"#EFF6FF",borderRadius:99,padding:"3px 9px",fontSize:11,fontWeight:600}}>💧{fmtS(lastW.date)}</span>:<span style={{color:"#D97706",background:"#FFFBEB",borderRadius:99,padding:"3px 9px",fontSize:11,fontWeight:600}}>💧Not watered</span>}
          {lastWeed?<span style={{color:"#16A34A",background:"#F0FDF4",borderRadius:99,padding:"3px 9px",fontSize:11,fontWeight:600}}>🌿Weeded {fmtS(lastWeed.date)}</span>:<span style={{color:"#9CA3AF",background:"#F3F4F6",borderRadius:99,padding:"3px 9px",fontSize:11}}>🌿Not weeded</span>}
          {harvested>0&&<span style={{color:"#D97706",background:"#FFFBEB",borderRadius:99,padding:"3px 9px",fontSize:11,fontWeight:600}}>⚖️{harvested}kg</span>}
          <span style={{color:"#6B7280",background:"#F3F4F6",borderRadius:99,padding:"3px 9px",fontSize:11}}>🔄{b.irrigation}</span>
        </div>
        <button onClick={()=>setShowFert(x=>!x)} style={{marginTop:10,width:"100%",padding:"8px",borderRadius:11,border:`1.5px dashed ${showFert?"#7C3AED":"#C4B5FD"}`,background:showFert?"#F5F3FF":"transparent",color:"#7C3AED",fontSize:12,fontWeight:700,cursor:"pointer"}}>
          {showFert?"▲ Hide":"🧪 Fertilization Schedule"}
        </button>
        {showFert&&<FertSchedule batch={b} logs={fertLogs} onLog={onLogFert}/>}
      </div>
    </div>
  );
}

// ── Chicken Detail ─────────────────────────────────────────────────────────
function ChickenDetail({b,onBack,onUpdateMortality}){
  const[mort,setMort]=useState(b.mortality||0);
  const[saving,setSaving]=useState(false);
  const[localB,setLocalB]=useState(b);
  const calc=calcBatch(localB);
  const{dOld,alive,phases,feedCost,chickCost,totalCost,revenue,profit,cp,dlp}=calc;
  const profitable=profit>=0;
  return(
    <div>
      <button onClick={onBack} style={{background:"#F3F4F6",border:"none",borderRadius:12,padding:"9px 16px",fontSize:13,fontWeight:600,cursor:"pointer",color:"#374151",marginBottom:16}}>← All Batches</button>
      <div style={{background:"#fff",borderRadius:20,overflow:"hidden",boxShadow:"0 4px 16px rgba(0,0,0,.07)",marginBottom:14}}>
        <div style={{background:"linear-gradient(135deg,#78350F,#92400E)",padding:"14px 16px",color:"#fff"}}>
          <div style={{fontSize:17,fontWeight:800}}>🐔 {b.name||"Chicken Batch"}</div>
          <div style={{fontSize:12,opacity:.75,marginTop:3}}>Started {fmt(b.startDate)} · {b.numBirds} birds · {alive} alive</div>
        </div>
        <div style={{padding:"14px 16px"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#374151",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Feed Program · Day {dOld}</div>
          <FeedBar dOld={dOld}/>
          <div style={{background:cp.bg,borderRadius:12,padding:12,border:`1.5px solid ${cp.color}`,margin:"12px 0"}}>
            <div style={{fontSize:14,fontWeight:800,color:cp.tc}}>🌾 Current: {cp.name}</div>
            <div style={{fontSize:12,color:cp.tc,opacity:.85,marginTop:2}}>{cp.weekLabel} · {cp.protein} protein · {cp.gpb}g/bird/day</div>
            {dlp>=0&&dlp<=3&&<div style={{marginTop:8,background:"#DC2626",borderRadius:8,padding:"7px 10px",color:"#fff",fontSize:12,fontWeight:800}}>⚡ Switch to {FP[cp.id+1]?.name||"Slaughter"} {dlp===0?"TODAY!":dlp===1?"TOMORROW!":`in ${dlp} days!`}</div>}
          </div>
          <div style={{display:"flex",gap:6,marginBottom:12}}>
            {FP.map((p,i)=>{const done=dOld>p.dayEnd,active=cp.id===i;return(
              <div key={i} style={{flex:1,background:done||active?p.bg:"#F9FAFB",borderRadius:11,padding:"9px 6px",textAlign:"center",border:`1.5px solid ${done||active?p.color:"#E5E7EB"}`}}>
                <div style={{fontSize:10,color:done||active?p.tc:"#9CA3AF",fontWeight:700,textTransform:"uppercase",marginBottom:2}}>{p.short}</div>
                <div style={{fontSize:12,fontWeight:700,color:done||active?p.tc:"#9CA3AF"}}>{phases[i].kg.toFixed(1)}kg</div>
                <div style={{fontSize:10,color:"#9CA3AF"}}>{$(phases[i].cost)}</div>
                {done&&<div style={{fontSize:9,color:p.color,fontWeight:700,marginTop:2}}>✓</div>}
                {active&&<div style={{fontSize:9,color:p.color,fontWeight:700,marginTop:2}}>Active</div>}
              </div>
            );})}
          </div>
          <div style={{background:"#F9FAFB",borderRadius:11,padding:12,marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:"#374151",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>📝 Update Mortality</div>
            <div style={{display:"flex",gap:8}}><input type="number" value={mort} onChange={e=>setMort(e.target.value)} style={{...IS,flex:1}} placeholder="Birds lost"/><button onClick={async()=>{setSaving(true);await onUpdateMortality(b.id,parseInt(mort)||0);setLocalB(x=>({...x,mortality:parseInt(mort)||0}));setSaving(false);}} disabled={saving} style={{...BS,padding:"11px 16px",opacity:saving?.7:1}}>{saving?"…":"Save"}</button></div>
          </div>
          <div style={{background:profitable?"#F0FDF4":"#FEF2F2",borderRadius:14,padding:14,border:`1.5px solid ${profitable?"#BBF7D0":"#FECACA"}`}}>
            <div style={{fontSize:11,fontWeight:700,color:"#374151",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>💰 Financial Summary</div>
            {[{l:"Chick cost",v:$(chickCost),s:`${b.numBirds} × ${$(b.costPerChick)}`},{l:"Feed cost",v:$(feedCost),s:`${phases.reduce((s,p)=>s+p.kg,0).toFixed(1)}kg consumed`},{l:"Other costs",v:$(b.otherCosts||0)},{l:"Total cost",v:$(totalCost),bold:true},{l:"Expected revenue",v:$(revenue),s:`${alive} × ${b.avgWeight}kg × ${$(b.salePrice)}/kg`,col:"#16A34A"},{l:`Projected ${profitable?"profit":"loss"}`,v:$(Math.abs(profit)),bold:true,col:profitable?"#16A34A":"#DC2626"}].map((r,i)=>(
              <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8,paddingBottom:8,borderBottom:i<5?"1px solid rgba(0,0,0,.05)":"none"}}>
                <div><div style={{fontSize:13,color:r.col||"#374151",fontWeight:r.bold?700:400}}>{r.l}</div>{r.s&&<div style={{fontSize:11,color:"#9CA3AF"}}>{r.s}</div>}</div>
                <div style={{fontSize:13,fontWeight:r.bold?800:600,color:r.col||"#1F2937"}}>{r.v}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── MODALS ─────────────────────────────────────────────────────────────────
function AddBatchModal({onSave,onClose}){
  const[f,setF]=useState({crop:"Spinach",variety:"",bed:"",planted:today(),harvest:"",area:"",irrigation:"Every 2 days",notes:"",logged_by:""});
  const set=(k,v)=>setF(x=>({...x,[k]:v}));
  useEffect(()=>{const d=CM[f.crop]?.days;if(d&&f.planted){const h=new Date(f.planted);h.setDate(h.getDate()+d);set("harvest",h.toISOString().split("T")[0]);}},[f.crop,f.planted]);
  return(
    <Modal title="🌱 New Crop Batch" onClose={onClose}>
      <Field label="Crop"><div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{CROPS.map(c=>{const m=CM[c];return<button key={c} onClick={()=>set("crop",c)} style={{display:"flex",alignItems:"center",gap:5,padding:"8px 12px",borderRadius:12,border:`2px solid ${f.crop===c?m.color:"#E5E7EB"}`,background:f.crop===c?m.bg:"#fff",color:f.crop===c?m.color:"#6B7280",fontSize:12,fontWeight:700,cursor:"pointer"}}><span style={{fontSize:16}}>{m.icon}</span>{c}</button>;})}</div></Field>
      <Field label="Variety"><input value={f.variety} onChange={e=>set("variety",e.target.value)} placeholder="e.g. F1, Local seed" style={IS}/></Field>
      <Field label="Bed / Plot"><input value={f.bed} onChange={e=>set("bed",e.target.value)} placeholder="e.g. Bed A3" style={IS}/></Field>
      <div style={{display:"flex",gap:8}}><Field label="Planted" style={{flex:1}}><input type="date" value={f.planted} onChange={e=>set("planted",e.target.value)} style={IS}/></Field><Field label="Harvest" style={{flex:1}}><input type="date" value={f.harvest} onChange={e=>set("harvest",e.target.value)} style={IS}/></Field></div>
      <Field label="Area (m²)"><input type="number" value={f.area} onChange={e=>set("area",e.target.value)} placeholder="50" style={IS}/></Field>
      <Field label="Irrigation"><select value={f.irrigation} onChange={e=>set("irrigation",e.target.value)} style={IS}>{IRR.map(o=><option key={o}>{o}</option>)}</select></Field>
      <Field label="Added by"><TeamPicker value={f.logged_by} onChange={v=>set("logged_by",v)}/></Field>
      <Field label="Notes"><textarea value={f.notes} onChange={e=>set("notes",e.target.value)} rows={2} style={{...IS,resize:"vertical"}}/></Field>
      <button onClick={()=>f.planted&&f.harvest&&onSave(f)} style={{...BS,width:"100%",marginTop:10}}>Save Crop Batch</button>
    </Modal>
  );
}

// ── MAIN APP ───────────────────────────────────────────────────────────────
function App(){
  const[tab,setTab]=useState("dashboard");
  const[batches,setBatches]=useState([]);
  const[events,setEvents]=useState([]);
  const[fertLogs,setFertLogs]=useState([]);
  const[cBatches,setCBatches]=useState([]);
  const[tasks,setTasks]=useState([]);
  const[loading,setLoading]=useState(true);
  const[syncing,setSyncing]=useState(false);
  const[lastSync,setLastSync]=useState(null);
  const[toast,setToast]=useState(null);
  const[showAddBatch,setShowAddBatch]=useState(false);
  const[showAddEvent,setShowAddEvent]=useState(false);
  const[showAddChicken,setShowAddChicken]=useState(false);
  const[showAddTask,setShowAddTask]=useState(false);
  const[evtBatchId,setEvtBatchId]=useState(null);

  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};

  const fetchAll=useCallback(async(quiet=false)=>{
    if(!quiet)setSyncing(true);
    try{
      const[{data:b,error:be},{data:e,error:ee},{data:fl},{data:c,error:ce},{data:t,error:te}]=await Promise.all([
        sb.from("batches").select("*").order("created_at",{ascending:false}),
        sb.from("events").select("*").order("date",{ascending:false}),
        sb.from("fert_logs").select("*").order("created_at",{ascending:false}),
        sb.from("chicken_batches").select("*").order("created_at",{ascending:false}),
        sb.from("tasks").select("*").order("created_at",{ascending:false}),
      ]);
      if(be||ee||ce||te)throw new Error("Fetch error");
      setBatches((b||[]).map(nB));setEvents((e||[]).map(nE));
      setFertLogs((fl||[]).map(nF));setCBatches((c||[]).map(nC));setTasks((t||[]).map(nT));
      setLastSync(new Date());
    }catch{showToast("Sync failed","error");}
    finally{setSyncing(false);setLoading(false);}
  },[]);

  useEffect(()=>{
    fetchAll();
    const onVis=()=>{if(document.visibilityState==="visible")fetchAll(true);};
    document.addEventListener("visibilitychange",onVis);
    const ch=sb.channel("farm-v5")
      .on("postgres_changes",{event:"*",schema:"public",table:"batches"},()=>fetchAll(true))
      .on("postgres_changes",{event:"*",schema:"public",table:"events"},()=>fetchAll(true))
      .on("postgres_changes",{event:"*",schema:"public",table:"fert_logs"},()=>fetchAll(true))
      .on("postgres_changes",{event:"*",schema:"public",table:"chicken_batches"},()=>fetchAll(true))
      .on("postgres_changes",{event:"*",schema:"public",table:"tasks"},()=>fetchAll(true))
      .subscribe();
    return()=>{document.removeEventListener("visibilitychange",onVis);sb.removeChannel(ch);};
  },[fetchAll]);

  const addBatch=async f=>{const{error}=await sb.from("batches").insert({...dB({...f,createdAt:undefined}),id:uid()});if(error){showToast("Failed: "+error.message,"error");return;}setShowAddBatch(false);showToast("Crop batch saved ✓");fetchAll(true);};
  const addEvent=async f=>{const{error}=await sb.from("events").insert({...dE({...f,createdAt:undefined}),id:uid()});if(error){showToast("Failed: "+error.message,"error");return;}setShowAddEvent(false);setEvtBatchId(null);showToast("Activity logged ✓");fetchAll(true);};
  const addFertLog=async(batchId,fertId,name)=>{const{error}=await sb.from("fert_logs").insert({id:uid(),batch_id:batchId,fert_id:fertId,name,date:today(),logged_by:""});if(error){showToast("Failed","error");return;}showToast(`${name} logged ✓`);fetchAll(true);};
  const addChicken=async f=>{const{error}=await sb.from("chicken_batches").insert({...dC({...f,createdAt:undefined,id:uid()})});if(error){showToast("Failed: "+error.message,"error");return;}setShowAddChicken(false);showToast("Chicken batch saved ✓");fetchAll(true);};
  const updateMortality=async(id,mortality)=>{const{error}=await sb.from("chicken_batches").update({mortality}).eq("id",id);if(error){showToast("Failed","error");return;}showToast("Updated ✓");fetchAll(true);};
  const addTask=async f=>{
    const payload={id:uid(),title:f.title,due_date:f.dueDate||null,priority:f.priority||"Medium",category:f.category||"General",assigned_to:f.assignedTo||null,notes:f.notes||null,completed:false,completed_date:null};
    const{error}=await sb.from("tasks").insert(payload);
    if(error){showToast("Failed: "+error.message,"error");return;}
    setShowAddTask(false);showToast("Task added ✓");fetchAll(true);
  };
  const toggleTask=async t=>{const{error}=await sb.from("tasks").update({completed:!t.completed,completed_date:!t.completed?today():null}).eq("id",t.id);if(error){showToast("Failed","error");return;}fetchAll(true);};

  const fmtSync=()=>{if(!lastSync)return"";const m=Math.round((new Date()-lastSync)/60000);return m<1?"Just synced":`${m}m ago`;};
  const pendingTasks=tasks.filter(t=>!t.completed).length;
  const smartAlerts=generateSmartAlerts(batches,cBatches,events,fertLogs);

  if(loading)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"linear-gradient(160deg,#0F3D1F,#166534)",gap:16}}>
      <div style={{fontSize:68,animation:"pulse 1.5s ease infinite"}}>🌱</div>
      <div style={{color:"#fff",fontSize:20,fontWeight:800}}>Farm Manager</div>
      <div style={{color:"rgba(255,255,255,.55)",fontSize:13}}>Ntabazinduna · Zimbabwe</div>
      <div style={{width:44,height:44,border:"3px solid rgba(255,255,255,.2)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin .8s linear infinite",marginTop:8}}/>
    </div>
  );

  return(
    <div style={{fontFamily:"system-ui,-apple-system,sans-serif",background:"#EEF5EE",minHeight:"100vh",maxWidth:480,margin:"0 auto",paddingBottom:88}}>
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
      <div style={{background:"linear-gradient(135deg,#0F3D1F,#14532D,#166534)",color:"#fff",padding:"18px 16px 14px",boxShadow:"0 6px 24px rgba(15,61,31,.3)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:9,letterSpacing:3,textTransform:"uppercase",opacity:.55,marginBottom:3}}>📍 Ntabazinduna · Zimbabwe</div>
            <div style={{fontSize:21,fontWeight:900,letterSpacing:-1}}>🌱 Farm Manager</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,.6)",marginTop:3}}>Lincoln · Thandeka · Vuyi · Velile</div>
          </div>
          <button onClick={()=>fetchAll()} style={{background:"rgba(255,255,255,.12)",border:"1px solid rgba(255,255,255,.18)",borderRadius:11,padding:"7px 12px",color:"#fff",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",gap:5}}>
            <span className={syncing?"spin":""}style={{fontSize:14}}>↻</span>
            <span style={{opacity:.8}}>{syncing?"Syncing":fmtSync()}</span>
          </button>
        </div>
      </div>
      <div style={{padding:13}}>
        {tab==="dashboard"&&<DashboardTab batches={batches} cBatches={cBatches} events={events} fertLogs={fertLogs} tasks={tasks} onAddTask={()=>setShowAddTask(true)} onToggleTask={toggleTask}/>}
        {tab==="crops"&&<CropsTab batches={batches} events={events} fertLogs={fertLogs} onAddBatch={()=>setShowAddBatch(true)} onLogEvent={id=>{setEvtBatchId(id);setShowAddEvent(true);}} onLogFert={addFertLog}/>}
        {tab==="chickens"&&<ChickensTab cBatches={cBatches} onAddBatch={()=>setShowAddChicken(true)} onUpdateMortality={updateMortality}/>}
        {tab==="tasks"&&<TasksTab tasks={tasks} onAddTask={()=>setShowAddTask(true)} onToggle={toggleTask}/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(255,255,255,.94)",borderTop:"1px solid rgba(0,0,0,.07)",display:"flex",zIndex:100,boxShadow:"0 -4px 24px rgba(0,0,0,.1)",backdropFilter:"blur(12px)"}}>
        {[{key:"dashboard",icon:"📊",label:"Overview"},{key:"crops",icon:"🌱",label:"Crops"},{key:"chickens",icon:"🐔",label:"Chickens"},{key:"tasks",icon:"✅",label:"Tasks",badge:pendingTasks}].map(t=>(
          <button key={t.key} onClick={()=>setTab(t.key)} style={{flex:1,padding:"10px 0 8px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:tab===t.key?"#0F3D1F":"#9CA3AF",fontWeight:tab===t.key?800:400,fontSize:10,borderTop:tab===t.key?"2.5px solid #0F3D1F":"2.5px solid transparent",position:"relative"}}>
            <span style={{fontSize:21}}>{t.icon}</span>{t.label}
            {t.badge>0&&<div style={{position:"absolute",top:6,right:"calc(50% - 18px)",width:16,height:16,borderRadius:99,background:"#DC2626",color:"#fff",fontSize:9,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{t.badge}</div>}
          </button>
        ))}
      </div>
      {showAddBatch&&<AddBatchModal onSave={addBatch} onClose={()=>setShowAddBatch(false)}/>}
      {showAddEvent&&<AddEventModal batches={batches} defaultId={evtBatchId} onSave={addEvent} onClose={()=>{setShowAddEvent(false);setEvtBatchId(null);}}/>}
      {showAddChicken&&<AddChickenModal onSave={addChicken} onClose={()=>setShowAddChicken(false)}/>}
      {showAddTask&&<AddTaskModal onSave={addTask} onClose={()=>setShowAddTask(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").catch(()=>{}));
</script>
</body>
</html>
