// ── Chicken Calc ───────────────────────────────────────────────────────────
function calcBatch(b){
  const dOld=Math.max(0,dBetween(b.startDate,today()));
  const alive=(b.numBirds||0)-(b.mortality||0);
  const phases=FP.map((p,i)=>{
    const d=Math.min(dOld,p.dayEnd)-Math.max(0,p.dayStart-1);
    const kg=(Math.max(0,d)*p.gpb*(b.numBirds||0))/1000;
    const price=[b.priceStarter||32,b.priceGrower||30,b.priceFinisher||28][i];
    return{...p,kg,cost:(kg/50)*price};
  });
  const feedCost=phases.reduce((s,p)=>s+p.cost,0);
  const chickCost=(b.numBirds||0)*(b.costPerChick||0.75);
  const other=parseFloat(b.otherCosts)||0;
  const totalCost=feedCost+chickCost+other;
  const revenue=alive*(b.avgWeight||2)*(b.salePrice||4.5);
  const profit=revenue-totalCost;
  const cp=dOld>=29?FP[2]:dOld>=15?FP[1]:FP[0];
  const dlp=cp.dayEnd-dOld;
  return{dOld,alive,phases,feedCost,chickCost,other,totalCost,revenue,profit,cp,dlp,mortalityPct:(((b.mortality||0)/(b.numBirds||1))*100).toFixed(1)};
}

const WI={0:"☀️",1:"🌤",2:"⛅",3:"☁️",45:"🌫",51:"🌦",53:"🌦",61:"🌧",63:"🌧",65:"🌧",80:"🌦",81:"🌧",95:"⛈"};
const WT={0:"Clear sky",1:"Mainly clear",2:"Partly cloudy",3:"Overcast",45:"Foggy",51:"Light drizzle",53:"Drizzle",61:"Light rain",63:"Rain",65:"Heavy rain",80:"Showers",95:"Thunderstorm"};

const fmtH=h=>h===0?"12am":h<12?`${h}am`:h===12?"12pm":`${h-12}pm`;

function getTips(c){
  const tips=[],hr=new Date().getHours();
  if(c.precipitation>5)tips.push({i:"💧",col:"#2563EB",t:"Rain today — skip irrigation"});
  else if(c.temperature_2m>34)tips.push({i:"🌡️",col:"#DC2626",t:hr<9?"Hot day ahead — water now before heat builds":"Very hot — mulch soil & shade seedlings"});
  if(c.relative_humidity_2m>85&&c.temperature_2m>22)tips.push({i:"🍄",col:"#D97706",t:"High humidity + heat = fungal risk on leaves"});
  if(c.weathercode<=1&&c.temperature_2m>=18&&c.temperature_2m<=28)tips.push({i:"✅",col:"#16A34A",t:hr<12?"Perfect morning for field work":"Good afternoon for transplanting"});
  if(c.temperature_2m>=15&&c.temperature_2m<=22)tips.push({i:"🥬",col:"#15803D",t:"Cool temps — great for brassicas & spinach"});
  if(c.temperature_2m>28&&c.relative_humidity_2m<50)tips.push({i:"🐔",col:"#F59E0B",t:"Hot & dry — ensure chickens have plenty of water"});
  if(hr>=5&&hr<8)tips.push({i:"🌄",col:"#B45309",t:"Early morning — best time to scout for pests"});
  return tips.slice(0,3);
}

function GrowthBar({planted,harvest}){
  const t=today(),total=dBetween(planted,harvest),elapsed=dBetween(planted,t);
  const pct=Math.min(100,Math.max(0,(elapsed/total)*100)),od=elapsed>total;
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#6B7280",marginBottom:4}}>
        <span>{fmt(planted)}</span>
        <span style={{color:od?"#DC2626":"#374151",fontWeight:od?700:500}}>{od?"⚠ Overdue":`${Math.max(0,total-elapsed)}d to harvest`}</span>
      </div>
      <div style={{background:"#E5E7EB",borderRadius:99,height:8,overflow:"hidden"}}>
        <div style={{width:`${pct}%`,height:"100%",borderRadius:99,background:od?"#DC2626":"linear-gradient(90deg,#22C55E,#F59E0B)"}}/>
      </div>
      <div style={{fontSize:10,color:"#9CA3AF",marginTop:3}}>Harvest: {fmt(harvest)}</div>
    </div>
  );
}

// ── Fert Schedule Component ────────────────────────────────────────────────
function FertSchedule({batch,logs,onLog}){
  const sched=FERT[batch.crop]||[];
  const weeksOld=wBetween(batch.planted,today());
  return(
    <div style={{marginTop:10}}>
      <div style={{fontSize:11,fontWeight:700,color:"#374151",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>🧪 Fertilization Schedule</div>
      {sched.map((s)=>{
        const isDue=weeksOld>=s.week;
        const isLogged=logs.some(l=>l.batchId===batch.id&&l.fertId===s.id);
        const daysUntil=(s.week*7)-dBetween(batch.planted,today());
        const isOD=isDue&&!isLogged;
        return(
          <div key={s.id} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",borderRadius:10,marginBottom:6,background:isLogged?"#F0FDF4":isOD?"#FEF2F2":"#F9FAFB",border:`1px solid ${isLogged?"#BBF7D0":isOD?"#FECACA":"#E5E7EB"}`}}>
            <div style={{width:26,height:26,borderRadius:7,background:isLogged?"#16A34A":isOD?"#DC2626":"#E5E7EB",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:12}}>
              {isLogged?"✓":isOD?"!":"📅"}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:700,color:"#1F2937"}}>{s.name}</div>
              <div style={{fontSize:11,color:"#6B7280"}}>{s.purpose} · {s.rate}</div>

// ── Chicken Detail ─────────────────────────────────────────────────────────
function ChickenDetail({b,onBack,onUpdateMortality}){
  const[mort,setMort]=useState(b.mortality||0);
  const[saving,setSaving]=useState(false);
  const[localB,setLocalB]=useState(b);
  const calc=calcBatch(localB);
  const{dOld,alive,phases,feedCost,chickCost,totalCost,revenue,profit,cp,dlp,mortalityPct}=calc;
  const profitable=profit>=0;
  const handleMortSave=async()=>{
    setSaving(true);
    await onUpdateMortality(b.id,parseInt(mort)||0);
    setLocalB(x=>({...x,mortality:parseInt(mort)||0}));
    setSaving(false);
  };
  return(
    <div>
      <button onClick={onBack} style={{background:"#F3F4F6",border:"none",borderRadius:10,padding:"8px 14px",fontSize:13,fontWeight:600,cursor:"pointer",color:"#374151",marginBottom:14}}>← All Batches</button>
      <div style={{background:"#fff",borderRadius:16,padding:16,boxShadow:"0 2px 8px rgba(0,0,0,.06)",marginBottom:12}}>
        <div style={{fontSize:17,fontWeight:800,color:"#111827",marginBottom:2}}>🐔 {b.name||"Chicken Batch"}</div>
        <div style={{fontSize:12,color:"#9CA3AF",marginBottom:14}}>Started {fmt(b.startDate)} · {b.numBirds} birds · {alive} alive · {mortalityPct}% mortality</div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"#374151",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Feed Program · Day {dOld}</div>
          <FeedBar dOld={dOld}/>
        </div>
        <div style={{background:cp.bg,borderRadius:12,padding:12,border:`1.5px solid ${cp.color}`,marginBottom:12}}>
          <div style={{fontSize:14,fontWeight:800,color:cp.tc}}>🌾 Current: {cp.name}</div>
          <div style={{fontSize:12,color:cp.tc,opacity:.85,marginTop:2}}>{cp.weekLabel} · {cp.protein} protein · {cp.gpb}g/bird/day</div>
          <div style={{fontSize:12,color:cp.tc,marginTop:3,fontStyle:"italic"}}>{cp.desc}</div>
          {dlp>=0&&dlp<=3&&(
            <div style={{marginTop:10,background:"#DC2626",borderRadius:8,padding:"8px 12px",color:"#fff",fontSize:12,fontWeight:700}}>
              ⚡ Switch to {FP[cp.id+1]?.name||"Slaughter"} {dlp===0?"TODAY!":dlp===1?"TOMORROW!": `in ${dlp} days!`}
            </div>
          )}
        </div>
        <div style={{display:"flex",gap:6,marginBottom:14}}>
          {FP.map((p,i)=>{
            const done=dOld>p.dayEnd,active=cp.id===i;
            return(
              <div key={i} style={{flex:1,background:done||active?p.bg:"#F9FAFB",borderRadius:12,padding:"10px 6px",textAlign:"center",border:`1.5px solid ${done||active?p.color:"#E5E7EB"}`}}>
                <div style={{fontSize:10,color:done||active?p.tc:"#9CA3AF",fontWeight:700,textTransform:"uppercase",letterSpacing:.5,marginBottom:3}}>{p.short}</div>
                <div style={{fontSize:12,fontWeight:700,color:done||active?p.tc:"#9CA3AF"}}>{phases[i].kg.toFixed(1)}kg</div>
                <div style={{fontSize:10,color:"#9CA3AF"}}>{$(phases[i].cost)}</div>
                {done&&<div style={{fontSize:10,color:p.color,fontWeight:700,marginTop:2}}>✓ Done</div>}
                {active&&<div style={{fontSize:10,color:p.color,fontWeight:700,marginTop:2}}>● Active</div>}
              </div>
            );
          })}
        </div>
        <div style={{background:"#F9FAFB",borderRadius:12,padding:12,marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:700,color:"#374151",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>📝 Update Mortality</div>
          <div style={{display:"flex",gap:8}}>
            <input type="number" value={mort} onChange={e=>setMort(e.target.value)} style={{...IS,flex:1}} placeholder="Birds lost"/>
            <button onClick={handleMortSave} disabled={saving} style={{...BS,padding:"10px 16px",opacity:saving?.7:1}}>{saving?"…":"Save"}</button>
          </div>
        </div>
        <div style={{background:profitable?"#F0FDF4":"#FEF2F2",borderRadius:14,padding:14,border:`1.5px solid ${profitable?"#BBF7D0":"#FECACA"}`}}>
          <div style={{fontSize:12,fontWeight:700,color:"#374151",textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>💰 Financial Summary</div>
          {[
            {l:"Chick cost",v:$(chickCost),s:`${b.numBirds} × ${$(b.costPerChick)}`},
            {l:"Feed cost (to date)",v:$(feedCost),s:`${phases.reduce((s,p)=>s+p.kg,0).toFixed(1)}kg consumed`},
            {l:"Other costs",v:$(b.otherCosts||0),s:"Meds, bedding, power"},
            {l:"Total cost",v:$(totalCost),bold:true},
            {l:"Expected revenue",v:$(revenue),s:`${alive} birds × ${b.avgWeight}kg × ${$(b.salePrice)}/kg`,col:"#16A34A"},
            {l:`Projected ${profitable?"profit":"loss"}`,v:$(Math.abs(profit)),bold:true,col:profitable?"#16A34A":"#DC2626"},
          ].map((r,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8,paddingBottom:8,borderBottom:i<5?"1px solid rgba(0,0,0,.05)":"none"}}>
              <div><div style={{fontSize:13,color:r.col||"#374151",fontWeight:r.bold?700:400}}>{r.l}</div>{r.s&&<div style={{fontSize:11,color:"#9CA3AF"}}>{r.s}</div>}</div>
              <div style={{fontSize:13,fontWeight:r.bold?800:600,color:r.col||"#1F2937"}}>{r.v}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

      {overdueTasks.length>0&&(
        <div style={{background:"#FEF2F2",border:"1.5px solid #FECACA",borderRadius:14,padding:14,marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:"#DC2626",marginBottom:6}}>⚠ {overdueTasks.length} Overdue Task{overdueTasks.length>1?"s":""}</div>
          {overdueTasks.slice(0,3).map(t=><div key={t.id} style={{fontSize:13,color:"#991B1B",marginBottom:3,fontWeight:500}}>· {t.title}{t.assignedTo?` (${t.assignedTo})`:""}</div>)}
        </div>
      )}
      {upcoming.length>0&&(
        <div style={{background:"#FFFBEB",border:"1.5px solid #FCD34D",borderRadius:14,padding:14,marginBottom:12}}>
          <div style={{fontSize:12,fontWeight:700,color:"#92400E",marginBottom:8}}>🗓 Harvest Due Within 2 Weeks</div>
          {upcoming.map(b=>(
            <div key={b.id} style={{display:"flex",justifyContent:"space-between",fontSize:13,color:"#374151",marginBottom:4}}>
              <span>{CM[b.crop]?.icon} {b.crop}{b.bed?` · ${b.bed}`:""}</span>
              <span style={{fontWeight:700,color:"#D97706"}}>{fmt(b.harvest)}</span>
            </div>
          ))}
        </div>
      )}
      {activeCk.map(b=>{
        const{cp,dOld,dlp,alive}=calcBatch(b);
        return(
          <div key={b.id} style={{background:"#fff",borderRadius:14,padding:14,marginBottom:10,boxShadow:"0 2px 6px rgba(0,0,0,.06)",borderLeft:`4px solid ${cp.color}`}}>
            <div style={{fontSize:13,fontWeight:700,color:"#1F2937",marginBottom:4}}>🐔 {b.name||"Chicken Batch"} <span style={{fontSize:11,color:"#9CA3AF",fontWeight:400}}>· Day {dOld} · {alive} alive</span></div>
            <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:cp.bg,borderRadius:10,marginBottom:8}}>
              <span style={{fontSize:16}}>🌾</span>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:cp.tc}}>Current Feed: {cp.name}</div>
                <div style={{fontSize:11,color:cp.tc,opacity:.8}}>{dlp>=0&&dlp<=3?`⚡ Switch ${dlp===0?"TODAY":dlp===1?"TOMORROW":`in ${dlp}d`}!`:`${cp.protein} protein · ${cp.gpb}g/bird/day`}</div>
              </div>
            </div>
            <FeedBar dOld={dOld}/>
          </div>
        );
      })}
      {todayTasks.length>0&&(
        <div style={{background:"#fff",borderRadius:14,padding:14,marginBottom:10,boxShadow:"0 2px 6px rgba(0,0,0,.06)"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#2563EB",marginBottom:8}}>📋 Due Today</div>
          {todayTasks.map(t=><div key={t.id} style={{fontSize:13,color:"#374151",marginBottom:4}}>· {t.title}{t.assignedTo?<span style={{color:"#14532D",fontWeight:600}}> ({t.assignedTo})</span>:null}</div>)}
        </div>
      )}
    </div>
  );
}

function CropsTab({batches,events,fertLogs,onAddBatch,onLogEvent,onLogFert}){
  const sorted=[...batches].sort((a,b)=>a.planted>b.planted?-1:1);
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h2 style={{margin:0,fontSize:18,fontWeight:800,color:"#111827"}}>Crops</h2>
        <button onClick={onAddBatch} style={{background:"linear-gradient(135deg,#F59E0B,#D97706)",color:"#fff",border:"none",borderRadius:12,padding:"8px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>+ New Batch</button>
      </div>
      {sorted.length===0&&<div style={{textAlign:"center",padding:"48px 0",color:"#9CA3AF"}}><div style={{fontSize:44,marginBottom:12}}>🌱</div><div style={{fontSize:14,color:"#6B7280"}}>No crops yet</div></div>}
      {sorted.map(b=><CropCard key={b.id} b={b} events={events} fertLogs={fertLogs} onLogEvent={onLogEvent} onLogFert={onLogFert}/>)}
    </div>
  );
}

function ChickensTab({cBatches,onAddBatch,onUpdateMortality}){
  const[sel,setSel]=useState(null);
  if(sel){const b=cBatches.find(x=>x.id===sel);if(b)return<ChickenDetail b={b} onBack={()=>setSel(null)} onUpdateMortality={async(id,m)=>{await onUpdateMortality(id,m);}}/>;}
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h2 style={{margin:0,fontSize:18,fontWeight:800,color:"#111827"}}>Chickens</h2>
        <button onClick={onAddBatch} style={{background:"linear-gradient(135deg,#F59E0B,#D97706)",color:"#fff",border:"none",borderRadius:12,padding:"8px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>+ New Batch</button>
      </div>
      {cBatches.length===0&&<div style={{textAlign:"center",padding:"48px 0",color:"#9CA3AF"}}><div style={{fontSize:44,marginBottom:12}}>🐔</div><div style={{fontSize:14,color:"#6B7280"}}>No chicken batches yet</div></div>}
      {cBatches.map(b=>{
        const{dOld,alive,cp,dlp,profit,totalCost}=calcBatch(b);
        const profitable=profit>=0,switchSoon=dlp>=0&&dlp<=3;
        return(
          <div key={b.id} onClick={()=>setSel(b.id)} className="fade" style={{background:"#fff",borderRadius:16,padding:14,marginBottom:12,boxShadow:"0 2px 8px rgba(0,0,0,.06)",cursor:"pointer",borderLeft:`4px solid ${cp.color}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
              <div><div style={{fontSize:15,fontWeight:700,color:"#111827"}}>🐔 {b.name||"Chicken Batch"}</div><div style={{fontSize:12,color:"#9CA3AF",marginTop:2}}>{b.numBirds} birds · Day {dOld} · {alive} alive</div></div>
              <span style={{fontSize:11,fontWeight:700,padding:"3px 9px",borderRadius:99,background:cp.bg,color:cp.tc}}>{cp.short}</span>
            </div>
            <FeedBar dOld={dOld}/>
            {switchSoon&&<div style={{marginTop:8,background:"#FEF3C7",borderRadius:8,padding:"7px 10px",border:"1px solid #FCD34D"}}><span style={{fontSize:12,fontWeight:700,color:"#92400E"}}>⚡ Switch to {FP[cp.id+1]?.name||"Slaughter"} {dlp===0?"TODAY!":dlp===1?"TOMORROW!":`in ${dlp}d!`}</span></div>}
            <div style={{display:"flex",gap:8,marginTop:10}}>
              <span style={{fontSize:12,fontWeight:600,padding:"3px 9px",borderRadius:99,background:profitable?"#F0FDF4":"#FEF2F2",color:profitable?"#16A34A":"#DC2626"}}>{profitable?"📈":"📉"} {$(Math.abs(profit))} {profitable?"profit":"loss"}</span>
              <span style={{fontSize:12,color:"#6B7280",background:"#F3F4F6",borderRadius:99,padding:"3px 9px"}}>Cost: {$(totalCost)}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function TasksTab({tasks,onAddTask,onToggle}){
  const[filter,setFilter]=useState("pending");
  const filtered=tasks.filter(t=>filter==="all"||(filter==="pending"&&!t.completed)||(filter==="done"&&t.completed))
    .sort((a,b)=>{if(a.completed!==b.completed)return a.completed?1:-1;return({High:0,Medium:1,Low:2}[a.priority]||1)-({High:0,Medium:1,Low:2}[b.priority]||1);});
  const pBg={High:"#FEF2F2",Medium:"#FFFBEB",Low:"#F0FDF4"},pCol={High:"#DC2626",Medium:"#D97706",Low:"#16A34A"};
  const catI={Crops:"🌱",Chickens:"🐔",Maintenance:"🔧",General:"📋"};
  const od=t=>!t.completed&&t.dueDate&&dBetween(t.dueDate,today())>0;
  return(
    <div>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <h2 style={{margin:0,fontSize:18,fontWeight:800,color:"#111827"}}>Tasks</h2>
        <button onClick={onAddTask} style={{background:"linear-gradient(135deg,#2563EB,#1D4ED8)",color:"#fff",border:"none",borderRadius:12,padding:"8px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>+ Task</button>
      </div>
      <div style={{display:"flex",gap:6,marginBottom:14}}>
        {[{k:"pending",l:"Pending"},{k:"done",l:"Done"},{k:"all",l:"All"}].map(({k,l})=>(
          <button key={k} onClick={()=>setFilter(k)} style={{padding:"6px 14px",borderRadius:99,fontSize:12,fontWeight:600,border:"none",cursor:"pointer",background:filter===k?"#1D4ED8":"#E5E7EB",color:filter===k?"#fff":"#6B7280"}}>{l}</button>
        ))}
      </div>
      {filtered.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:"#9CA3AF",fontSize:13}}>No tasks here</div>}
      {filtered.map(t=>(
        <div key={t.id} className="fade" style={{background:t.completed?"#F9FAFB":"#fff",borderRadius:14,padding:14,marginBottom:10,boxShadow:"0 2px 6px rgba(0,0,0,.05)",opacity:t.completed?.65:1,border:od(t)?"1.5px solid #FECACA":"1px solid transparent"}}>
          <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
            <button onClick={()=>onToggle(t.id)} style={{width:24,height:24,borderRadius:6,border:`2px solid ${t.completed?"#16A34A":"#D1D5DB"}`,background:t.completed?"#16A34A":"#fff",cursor:"pointer",flexShrink:0,marginTop:1,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:13,fontWeight:700}}>
              {t.completed?"✓":""}
            </button>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:600,color:t.completed?"#9CA3AF":"#111827",textDecoration:t.completed?"line-through":"none",marginBottom:5}}>{t.title}</div>
              <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                <span style={{fontSize:10,fontWeight:700,padding:"2px 7px",borderRadius:99,background:pBg[t.priority],color:pCol[t.priority]}}>{t.priority}</span>
                <span style={{fontSize:10,padding:"2px 7px",borderRadius:99,background:"#F3F4F6",color:"#6B7280"}}>{catI[t.category]||"📋"} {t.category}</span>
                {t.assignedTo&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:99,background:"#F0FDF4",color:"#14532D",fontWeight:600}}>👤{t.assignedTo}</span>}
                {t.dueDate&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:99,background:od(t)?"#FEF2F2":"#F3F4F6",color:od(t)?"#DC2626":"#6B7280",fontWeight:od(t)?700:400}}>{od(t)?"⚠ ":""}{fmt(t.dueDate)}</span>}
              </div>
              {t.notes&&<div style={{fontSize:11,color:"#9CA3AF",marginTop:5,fontStyle:"italic"}}>{t.notes}</div>}
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ── App ────────────────────────────────────────────────────────────────────
function App(){
  const[tab,setTab]=useState("dashboard");
  const[batches,setBatches]=useState([]);
  const[events,setEvents]=useState([]);
  const[fertLogs,setFertLogs]=useState([]);
  const[cBatches,setCBatches]=useState([]);
  const[tasks,setTasks]=useState([]);
  const[loading,setLoading]=useState(true);
  const[syncing,setSyncing]=useState(false);
  const[lastSync,setLastSync]=useState(null);
  const[toast,setToast]=useState(null);
  const[showAddBatch,setShowAddBatch]=useState(false);
  const[showAddEvent,setShowAddEvent]=useState(false);
  const[showAddChicken,setShowAddChicken]=useState(false);
  const[showAddTask,setShowAddTask]=useState(false);
  const[evtBatchId,setEvtBatchId]=useState(null);

  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};

  const fetchAll=useCallback(async(quiet=false)=>{
    if(!quiet)setSyncing(true);
    try{
      const[{data:b,error:be},{data:e,error:ee},{data:f,error:fe},{data:c,error:ce},{data:t,error:te}]=await Promise.all([
        sb.from("batches").select("*").order("created_at",{ascending:false}),
        sb.from("events").select("*").order("date",{ascending:false}),
        sb.from("fert_logs").select("*").order("created_at",{ascending:false}),
        sb.from("chicken_batches").select("*").order("created_at",{ascending:false}),
        sb.from("tasks").select("*").order("created_at",{ascending:false}),
      ]);
      if(be||ee||fe||ce||te)throw new Error("Fetch error");
      setBatches((b||[]).map(nB));
      setEvents((e||[]).map(nE));
      setFertLogs((f||[]).map(nF));
      setCBatches((c||[]).map(nC));
      setTasks((t||[]).map(nT));
      setLastSync(new Date());
    }catch(err){showToast("Sync failed — check connection","error");}
    finally{setSyncing(false);setLoading(false);}
  },[]);

  useEffect(()=>{
    fetchAll();
    const onVis=()=>{if(document.visibilityState==="visible")fetchAll(true);};
    document.addEventListener("visibilitychange",onVis);
    const ch=sb.channel("farm-v3")
      .on("postgres_changes",{event:"*",schema:"public",table:"batches"},()=>fetchAll(true))
      .on("postgres_changes",{event:"*",schema:"public",table:"events"},()=>fetchAll(true))
      .on("postgres_changes",{event:"*",schema:"public",table:"fert_logs"},()=>fetchAll(true))
      .on("postgres_changes",{event:"*",schema:"public",table:"chicken_batches"},()=>fetchAll(true))
      .on("postgres_changes",{event:"*",schema:"public",table:"tasks"},()=>fetchAll(true))
      .subscribe();
    return()=>{document.removeEventListener("visibilitychange",onVis);sb.removeChannel(ch);};
  },[fetchAll]);

  const addBatch=async f=>{
    const{error}=await sb.from("batches").insert({...dB({...f,createdAt:undefined}),id:uid()});
    if(error){showToast("Failed to save","error");return;}
    setShowAddBatch(false);showToast("Crop batch saved ✓");fetchAll(true);
  };
  const addEvent=async f=>{
    const{error}=await sb.from("events").insert({...dE({...f,createdAt:undefined}),id:uid()});
    if(error){showToast("Failed to save","error");return;}
    setShowAddEvent(false);setEvtBatchId(null);showToast("Activity logged ✓");fetchAll(true);
  };
  const addFertLog=async(batchId,fertId,name)=>{
    const{error}=await sb.from("fert_logs").insert({id:uid(),batch_id:batchId,fert_id:fertId,name,date:today(),logged_by:""});
    if(error){showToast("Failed to save","error");return;}
    showToast(`${name} logged ✓`);fetchAll(true);
  };
  const addChicken=async f=>{
    const{error}=await sb.from("chicken_batches").insert({...dC({...f,createdAt:undefined,id:uid()})});
    if(error){showToast("Failed to save","error");return;}
    setShowAddChicken(false);showToast("Chicken batch saved ✓");fetchAll(true);
  };
  const updateMortality=async(id,mortality)=>{
    const{error}=await sb.from("chicken_batches").update({mortality}).eq("id",id);
    if(error){showToast("Failed to update","error");return;}
    showToast("Mortality updated ✓");fetchAll(true);
  };
  const addTask=async f=>{
    const{error}=await sb.from("tasks").insert({...dT({...f,createdAt:undefined,completedDate:undefined}),id:uid(),completed:false});
    if(error){showToast("Failed to save","error");return;}
    setShowAddTask(false);showToast("Task added ✓");fetchAll(true);
  };
  const toggleTask=async t=>{
    const{error}=await sb.from("tasks").update({completed:!t.completed,completed_date:!t.completed?today():null}).eq("id",t.id);
    if(error){showToast("Failed to update","error");return;}
    fetchAll(true);
  };

  const fmtSync=()=>{if(!lastSync)return"";const m=Math.round((new Date()-lastSync)/60000);return m<1?"Just synced":`${m}m ago`;};
  const pendingTasks=tasks.filter(t=>!t.completed).length;

  if(loading)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"linear-gradient(160deg,#14532D,#166534)",gap:16}}>
      <div style={{fontSize:64,animation:"pulse 1.5s ease infinite"}}>🌱</div>
      <div style={{color:"#fff",fontSize:18,fontWeight:700}}>Farm Manager</div>
      <div style={{color:"rgba(255,255,255,.6)",fontSize:13}}>Loading your farm data…</div>
      <div style={{width:44,height:44,border:"3px solid rgba(255,255,255,.2)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin .8s linear infinite",marginTop:8}}/>
    </div>
  );

  return(
    <div style={{fontFamily:"system-ui,-apple-system,sans-serif",background:"#F0F7F0",minHeight:"100vh",maxWidth:480,margin:"0 auto",paddingBottom:88}}>
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}

      <div style={{background:"linear-gradient(135deg,#14532D,#166534)",color:"#fff",padding:"18px 16px 14px",boxShadow:"0 4px 16px rgba(20,83,45,.25)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:10,letterSpacing:3,textTransform:"uppercase",opacity:.6,marginBottom:3}}>📍 Ntabazinduna · Zimbabwe</div>
            <div style={{fontSize:21,fontWeight:800,letterSpacing:-.5}}>🌱 Farm Manager</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,.65)",marginTop:3}}>Lincoln · Thandeka · Vuyi · Velile</div>
          </div>
          <button onClick={()=>fetchAll()} style={{background:"rgba(255,255,255,.15)",border:"1px solid rgba(255,255,255,.2)",borderRadius:10,padding:"7px 12px",color:"#fff",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",gap:5}}>
            <span className={syncing?"spin":""}style={{fontSize:14}}>↻</span>
            <span style={{opacity:.85}}>{syncing?"Syncing…":fmtSync()}</span>
          </button>
        </div>
      </div>

      <div style={{padding:14}}>
        {tab==="dashboard"&&<DashboardTab batches={batches} cBatches={cBatches} tasks={tasks} fertLogs={fertLogs} events={events}/>}
        {tab==="crops"&&<CropsTab batches={batches} events={events} fertLogs={fertLogs} onAddBatch={()=>setShowAddBatch(true)} onLogEvent={id=>{setEvtBatchId(id);setShowAddEvent(true);}} onLogFert={addFertLog}/>}
        {tab==="chickens"&&<ChickensTab cBatches={cBatches} onAddBatch={()=>setShowAddChicken(true)} onUpdateMortality={updateMortality}/>}
        {tab==="tasks"&&<TasksTab tasks={tasks} onAddTask={()=>setShowAddTask(true)} onToggle={toggleTask}/>}
      </div>

      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#fff",borderTop:"1px solid #E5E7EB",display:"flex",zIndex:100,boxShadow:"0 -4px 20px rgba(0,0,0,.08)"}}>
        {[{key:"dashboard",icon:"📊",label:"Overview"},{key:"crops",icon:"🌱",label:"Crops"},{key:"chickens",icon:"🐔",label:"Chickens"},{key:"tasks",icon:"✅",label:`Tasks${pendingTasks>0?` (${pendingTasks})`:""}`}].map(t=>(
          <button key={t.key} onClick={()=>setTab(t.key)} style={{flex:1,padding:"10px 0 8px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,color:tab===t.key?"#14532D":"#9CA3AF",fontWeight:tab===t.key?700:400,fontSize:10,borderTop:tab===t.key?"2.5px solid #14532D":"2.5px solid transparent"}}>
            <span style={{fontSize:20}}>{t.icon}</span>{t.label}
          </button>
        ))}
      </div>

      {showAddBatch&&<AddBatchModal onSave={addBatch} onClose={()=>setShowAddBatch(false)}/>}
      {showAddEvent&&<AddEventModal batches={batches} defaultId={evtBatchId} onSave={addEvent} onClose={()=>{setShowAddEvent(false);setEvtBatchId(null);}}/>}
      {showAddChicken&&<AddChickenModal onSave={addChicken} onClose={()=>setShowAddChicken(false)}/>}
      {showAddTask&&<AddTaskModal onSave={addTask} onClose={()=>setShowAddTask(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").catch(()=>{}));
</script>
</body>
</html>
