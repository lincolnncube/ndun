// ── Chicken Calc ───────────────────────────────────────────────────────────
function calcBatch(b){
  const dOld=Math.max(0,dBetween(b.startDate,today()));
  const alive=(b.numBirds||0)-(b.mortality||0);
  const phases=FP.map((p,i)=>{
    const d=Math.min(dOld,p.dayEnd)-Math.max(0,p.dayStart-1);
    const kg=(Math.max(0,d)*p.gpb*(b.numBirds||0))/1000;
    const price=[b.priceStarter||32,b.priceGrower||30,b.priceFinisher||28][i];
    return{...p,kg,cost:(kg/50)*price};
  });
  const feedCost=phases.reduce((s,p)=>s+p.cost,0);
  const chickCost=(b.numBirds||0)*(b.costPerChick||0.75);
  const other=parseFloat(b.otherCosts)||0;
  const totalCost=feedCost+chickCost+other;
  const revenue=alive*(b.avgWeight||2)*(b.salePrice||4.5);
  const profit=revenue-totalCost;
  const cp=dOld>=29?FP[2]:dOld>=15?FP[1]:FP[0];
  const dlp=cp.dayEnd-dOld;
  return{dOld,alive,phases,feedCost,chickCost,other,totalCost,revenue,profit,cp,dlp,mortalityPct:(((b.mortality||0)/(b.numBirds||1))*100).toFixed(1)};
}

// ── Smart Alerts ───────────────────────────────────────────────────────────
function generateSmartAlerts(batches,cBatches,events,fertLogs){
  const alerts=[],t=today();
  batches.forEach(b=>{
    const meta=CM[b.crop]||{},dOld=dBetween(b.planted,t),dToH=dBetween(t,b.harvest);
    const bEvt=events.filter(e=>e.batchId===b.id);
    const lbl=`${meta.icon} ${b.crop}${b.bed?` (${b.bed})`:""}`;
    if(dToH<0&&dToH>-14)alerts.push({id:`oh-${b.id}`,icon:"⚠️",col:"#DC2626",bg:"#FEF2F2",title:`${b.crop} overdue for harvest`,desc:`${lbl} — ${Math.abs(dToH)}d past harvest date`,pri:0});
    if(dToH>=0&&dToH<=7)alerts.push({id:`h-${b.id}`,icon:"⚖️",col:"#D97706",bg:"#FFFBEB",title:`Harvest ${b.crop} soon`,desc:`${lbl} — ready in ${dToH===0?"today!":dToH+"d"}`,pri:dToH<=2?0:1});
    if(dOld>7){const lw=bEvt.filter(e=>e.type==="weeding").sort((a,z)=>z.date>a.date?1:-1)[0];const sw=lw?dBetween(lw.date,t):dOld;if(sw>=14)alerts.push({id:`w-${b.id}`,icon:"🌿",col:"#16A34A",bg:"#F0FDF4",title:`Weed ${b.crop}`,desc:`${lbl} — ${lw?`last weeded ${sw}d ago`:"not weeded yet"}`,pri:sw>=21?0:1});}
    const lwater=bEvt.filter(e=>e.type==="irrigation").sort((a,z)=>z.date>a.date?1:-1)[0];
    const maxI=IRR_DAYS[b.irrigation]||2,sw2=lwater?dBetween(lwater.date,t):dOld;
    if(sw2>maxI&&dOld>0)alerts.push({id:`irr-${b.id}`,icon:"💧",col:"#2563EB",bg:"#EFF6FF",title:`Water ${b.crop}`,desc:`${lbl} — not watered for ${sw2}d (schedule: ${b.irrigation})`,pri:sw2>maxI*2?0:1});
    const wOld=wBetween(b.planted,t);
    (FERT[b.crop]||[]).forEach(fs=>{const logged=fertLogs.some(l=>l.batchId===b.id&&l.fertId===fs.id);if(!logged&&wOld>=fs.week)alerts.push({id:`fert-${b.id}-${fs.id}`,icon:"🧪",col:"#7C3AED",bg:"#F5F3FF",title:`Apply ${fs.name}`,desc:`${lbl} — ${fs.purpose}`,pri:wOld>=fs.week+1?0:1});});
  });
  (cBatches||[]).filter(b=>!b.sold).forEach(b=>{
    const{dOld,dlp,cp}=calcBatch(b);
    if(dlp>=0&&dlp<=3&&cp.id<2)alerts.push({id:`feed-${b.id}`,icon:"🌾",col:cp.color,bg:cp.bg,title:`Switch to ${FP[cp.id+1]?.name}`,desc:`🐔 ${b.name||"Chicken Batch"} — ${dlp===0?"Switch TODAY!":dlp===1?"Switch TOMORROW!":`Switch in ${dlp} days`}`,pri:dlp===0?0:1});
    if(dOld>=40)alerts.push({id:`sl-${b.id}`,icon:"✅",col:"#D97706",bg:"#FFFBEB",title:"Chickens ready for slaughter",desc:`🐔 ${b.name||"Batch"} — Day ${dOld}. Plan harvest and contact buyers.`,pri:0});
  });
  return alerts.sort((a,b)=>a.pri-b.pri).slice(0,10);
}

// ── Weather ────────────────────────────────────────────────────────────────
const WI={0:"☀️",1:"🌤",2:"⛅",3:"☁️",45:"🌫",51:"🌦",53:"🌦",61:"🌧",63:"🌧",65:"🌧",80:"🌦",81:"🌧",95:"⛈"};
const WT={0:"Clear sky",1:"Mainly clear",2:"Partly cloudy",3:"Overcast",45:"Foggy",51:"Light drizzle",53:"Drizzle",61:"Light rain",63:"Rain",65:"Heavy rain",80:"Showers",95:"Thunderstorm"};
function getDailyBriefing(c,d){
  const maxT=Math.round(d.temperature_2m_max[0]),rain=d.precipitation_sum[0],rh=c.relative_humidity_2m,code=d.weathercode[0];
  if(rain>10)return{icon:"⛈",col:"#7C3AED",text:`Heavy rain (${rain}mm) — skip irrigation, check drainage.`};
  if(rain>3)return{icon:"🌧",col:"#2563EB",text:`${rain}mm rain expected — hold off watering today.`};
  if(maxT>36)return{icon:"🔥",col:"#DC2626",text:`Extreme heat (${maxT}°C) — water before 7am, double chicken water.`};
  if(maxT>32)return{icon:"🌡️",col:"#EA580C",text:`Hot day (${maxT}°C) — mulch beds and watch for heat stress.`};
  if(rh>85&&maxT>22)return{icon:"🍄",col:"#B45309",text:`High humidity — check crops for fungal disease today.`};
  if(code<=1&&maxT>=18&&maxT<=30)return{icon:"🌟",col:"#16A34A",text:`Perfect farming day (${maxT}°C) — great for all field work.`};
  return{icon:"🌤",col:"#374151",text:`Mild conditions (${maxT}°C) — good day for general farm tasks.`};
}

function PLWidget({financialLogs}){
  const now=new Date();
  const mLogs=(financialLogs||[]).filter(f=>{const d=new Date(f.date);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();});
  const income=mLogs.filter(f=>f.type==="income").reduce((s,f)=>s+(parseFloat(f.amount)||0),0);

riority}</span><span style={{fontSize:10,padding:"2px 7px",borderRadius:99,background:"#F3F4F6",color:"#6B7280"}}>{catI[t.category]||"📋"} {t.category}</span>{t.assignedTo&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:99,background:"#F0FDF4",color:"#14532D",fontWeight:700}}>👤{t.assignedTo}</span>}{t.dueDate&&<span style={{fontSize:10,padding:"2px 7px",borderRadius:99,background:od(t)?"#FEF2F2":"#F3F4F6",color:od(t)?"#DC2626":"#6B7280",fontWeight:od(t)?700:400}}>{od(t)?"⚠ ":""}{fmtS(t.dueDate)}</span>}</div>{t.notes&&<div style={{fontSize:11,color:"#9CA3AF",marginTop:4,fontStyle:"italic"}}>{t.notes}</div>}</div></div></div>))}</div>);
}
function FinanceTab({financialLogs,assets,onAddIncome,onAddExpense,onAddAsset}){

  const income=mLogs.filter(f=>f.type==="income").reduce((s,f)=>s+(parseFloat(f.amount)||0),0);
  const expenses=mLogs.filter(f=>f.type==="expense").reduce((s,f)=>s+(parseFloat(f.amount)||0),0);
  const profit=income-expenses,profitable=profit>=0;
  const totalAssets=(assets||[]).reduce((s,a)=>s+(parseFloat(a.currentValue)||parseFloat(a.purchaseValue)||0),0);
  const catI={"Equipment":"⚙️","Tools":"🔧","Infrastructure":"🏗","Vehicles":"🚗","Livestock (Breeding)":"🐄","Other":"📦"};
  const condCol={"Excellent":"#16A34A","Good":"#22C55E","Fair":"#D97706","Poor":"#DC2626","Needs Repair":"#DC2626"};
  const mn=new Date(selYear,selMonth,1).toLocaleString("en-GB",{month:"long",year:"numeric"});
  const prev=()=>{if(selMonth===0){setSelMonth(11);setSelYear(y=>y-1);}else setSelMonth(m=>m-1);};
  const next=()=>{if(selMonth===11){setSelMonth(0);setSelYear(y=>y+1);}else setSelMonth(m=>m+1);};
  const incByCat={},expByCat={};

    </div>

      </div>

        <div style={{fontSize:48}}>{profitable?"🎉":"📉"}</div>

      {Object.keys(expByCat).length>0&&<div style={{background:"#fff",borderRadius:13,padding:13,marginBottom:9,boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}><div style={{fontSize:11,fontWeight:700,color:"#DC2626",textTransform:"uppercase",letterSpacing:.5,marginBottom:9}}>Expense Breakdown</div>{Object.entries(expByCat).map(([cat,amt])=>(<div key={cat} style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:13,color:"#374151"}}>{cat}</span><span style={{fontSize:13,fontWeight:700,color:"#DC2626"}}>{$(amt)}</span></div>))}</div>}
      <div style={{background:"#fff",borderRadius:13,overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}><div style={{padding:"11px 13px",borderBottom:"1px solid #F3F4F6"}}><div style={{fontSize:12,fontWeight:700,color:"#374151"}}>All Transactions · {mn}</div></div>{mLogs.length===0&&<div style={{padding:"22px",textAlign:"center",color:"#9CA3AF",fontSize:13}}>No transactions this month</div>}{[...mLogs].sort((a,b)=>b.date>a.date?1:-1).map(f=>(<div key={f.id} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"10px 13px",borderBottom:"1px solid #F9FAFB"}}><div style={{display:"flex",gap:9,alignItems:"flex-start"}}><div style={{width:30,height:30,borderRadius:8,background:f.type==="income"?"#F0FDF4":"#FEF2F2",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>{f.type==="income"?"📈":"📉"}</div><div><div style={{fontSize:13,fontWeight:600,color:"#1F2937"}}>{f.description||f.category}</div><div style={{fontSize:11,color:"#9CA3AF"}}>{f.category} · {fmtS(f.date)}{f.loggedBy?` · ${f.loggedBy}`:""}</div></div></div><div style={{fontSize:13,fontWeight:800,color:f.type==="income"?"#16A34A":"#DC2626",flexShrink:0,marginLeft:8}}>{f.type==="income"?"+":"-"}{$(f.amount)}</div></div>))}</div>
    </div>)}
    {view==="assets"&&(<div>
      <div style={{background:"linear-gradient(135deg,#1E3A5F,#2563EB)",borderRadius:15,padding:"13px 17px",marginBottom:13,display:"flex",justifyContent:"space-between",alignItems:"center",boxShadow:"0 4px 14px rgba(37,99,235,.25)"}}><div><div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,.7)",textTransform:"uppercase",letterSpacing:.5,marginBottom:3}}>Total Asset Value</div><div style={{fontSize:26,fontWeight:900,color:"#fff",letterSpacing:-1}}>{$(totalAssets)}</div><div style={{fontSize:12,color:"rgba(255,255,255,.65)",marginTop:2}}>{(assets||[]).length} asset{(assets||[]).length!==1?"s":""} registered</div></div><div style={{fontSize:44}}>🏦</div></div>
      <button onClick={onAddAsset} style={{...BS,width:"100%",marginBottom:13,background:"linear-gradient(135deg,#2563EB,#1D4ED8)",boxShadow:"0 4px 12px rgba(37,99,235,.3)"}}>+ Add Asset</button>
      {(assets||[]).length===0&&<div style={{textAlign:"center",padding:"44px 0",color:"#9CA3AF"}}><div style={{fontSize:44,marginBottom:11}}>🏷</div><div style={{fontSize:14,color:"#6B7280"}}>No assets registered yet</div><div style={{fontSize:12,color:"#9CA3AF",marginTop:4}}>Tap "+ Add Asset" to register your first asset</div></div>}
      {(assets||[]).map(a=>{
        const serviceOverdue=a.nextService&&dBetween(a.nextService,today())>0;
        const serviceSoon=a.nextService&&dBetween(today(),a.nextService)<=14&&dBetween(today(),a.nextService)>=0;
        return(
        <div key={a.id} className="fade" style={{background:"#fff",borderRadius:16,overflow:"hidden",marginBottom:11,boxShadow:"0 3px 12px rgba(0,0,0,.07)"}}>
          {/* Header strip */}
          <div style={{background:catI[a.category]?"linear-gradient(135deg,#1E3A5F,#2563EB)":"linear-gradient(135deg,#374151,#1F2937)",padding:"11px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:22}}>{catI[a.category]||"📦"}</span>
              <div>
                <div style={{fontSize:14,fontWeight:800,color:"#fff"}}>{a.name}</div>
                <div style={{fontSize:11,color:"rgba(255,255,255,.65)"}}>{a.category}</div>
              </div>
            </div>
            <span style={{fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:99,background:(condCol[a.condition]||"#6B7280")+"33",color:"#fff",border:"1px solid rgba(255,255,255,.3)"}}>{a.condition}</span>
          </div>
          <div style={{padding:"12px 14px"}}>
            {/* Value row */}

              {parseFloat(a.purchaseValue)>0&&(
                <div style={{flex:1,background:"#F9FAFB",borderRadius:10,padding:"8px 10px"}}>
                  <div style={{fontSize:9,color:"#9CA3AF",marginBottom:2,textTransform:"uppercase",letterSpacing:.5}}>Purchase Cost</div>
                  <div style={{fontSize:15,fontWeight:800,color:"#374151"}}>{$(a.purchaseValue)}</div>
                  {a.purchaseDate&&<div style={{fontSize:10,color:"#9CA3AF",marginTop:2}}>{fmt(a.purchaseDate)}</div>}
                </div>

                <div style={{flex:1,background:"#F0FDF4",borderRadius:10,padding:"8px 10px"}}>
                  <div style={{fontSize:9,color:"#16A34A",marginBottom:2,textTransform:"uppercase",letterSpacing:.5}}>Current Value</div>

                    </div>

                </div>

                  {a.lastServiced&&<div><div style={{fontSize:9,color:"#9CA3AF"}}>Last Serviced</div><div style={{fontWeight:600,color:"#374151"}}>{fmt(a.lastServiced)}</div></div>}
                  {a.nextService&&<div><div style={{fontSize:9,color:"#9CA3AF"}}>Next Service</div><div style={{fontWeight:700,color:serviceOverdue?"#DC2626":serviceSoon?"#D97706":"#2563EB"}}>{fmt(a.nextService)}</div></div>}
                </div>
                {a.serviceNotes&&<div style={{fontSize:11,color:"#6B7280",marginTop:5,fontStyle:"italic"}}>{a.serviceNotes}</div>}
              </div>
            )}

            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>

              {a.notes&&<span style={{fontSize:10,color:"#6B7280",background:"#F3F4F6",borderRadius:99,padding:"2px 9px",fontStyle:"italic"}}>{a.notes}</span>}
            </div>
          </div>
        </div>
      );})}
    </div>)}
  </div>);

// ── APP ────────────────────────────────────────────────────────────────────
function App(){
  const[tab,setTab]=useState("dashboard");
  const[batches,setBatches]=useState([]);
  const[events,setEvents]=useState([]);
  const[fertLogs,setFertLogs]=useState([]);
  const[cBatches,setCBatches]=useState([]);
  const[tasks,setTasks]=useState([]);
  const[financialLogs,setFinancialLogs]=useState([]);
  const[assets,setAssets]=useState([]);
  const[loading,setLoading]=useState(true);
  const[syncing,setSyncing]=useState(false);
  const[lastSync,setLastSync]=useState(null);
  const[toast,setToast]=useState(null);
  const[showAddBatch,setShowAddBatch]=useState(false);
  const[showAddEvent,setShowAddEvent]=useState(false);
  const[showAddChicken,setShowAddChicken]=useState(false);
  const[showAddTask,setShowAddTask]=useState(false);
  const[showAddFinance,setShowAddFinance]=useState(null);
  const[showAddAsset,setShowAddAsset]=useState(false);
  const[evtBatchId,setEvtBatchId]=useState(null);

  const showToast=(msg,type="success")=>{setToast({msg,type});setTimeout(()=>setToast(null),3000);};

  const fetchAll=useCallback(async(quiet=false)=>{
    if(!quiet)setSyncing(true);
    try{
      const[r1,r2,r3,r4,r5,r6,r7]=await Promise.all([
        sb.from("batches").select("*").order("created_at",{ascending:false}),
        sb.from("events").select("*").order("date",{ascending:false}),
        sb.from("fert_logs").select("*").order("created_at",{ascending:false}),
        sb.from("chicken_batches").select("*").order("created_at",{ascending:false}),
        sb.from("tasks").select("*").order("created_at",{ascending:false}),
        sb.from("financial_logs").select("*").order("date",{ascending:false}),
        sb.from("assets").select("*").order("created_at",{ascending:false}),
      ]);
      if(r1.error||r2.error||r4.error)throw new Error(r1.error?.message||r2.error?.message||r4.error?.message);
      setBatches((r1.data||[]).map(nB));
      setEvents((r2.data||[]).map(nE));
      setFertLogs((r3.data||[]).map(nF));
      setCBatches((r4.data||[]).map(nC));
      setTasks((r5.data||[]).map(nT));
      setFinancialLogs((r6.data||[]).map(nFL));
      setAssets((r7.data||[]).map(nA));
      setLastSync(new Date());
    }catch(err){showToast("Sync failed: "+err.message,"error");}
    finally{setSyncing(false);setLoading(false);}
  },[]);

  useEffect(()=>{
    fetchAll();
    const onVis=()=>{if(document.visibilityState==="visible")fetchAll(true);};
    document.addEventListener("visibilitychange",onVis);
    const ch=sb.channel("farm-v6")
      .on("postgres_changes",{event:"*",schema:"public",table:"batches"},()=>fetchAll(true))
      .on("postgres_changes",{event:"*",schema:"public",table:"events"},()=>fetchAll(true))
      .on("postgres_changes",{event:"*",schema:"public",table:"fert_logs"},()=>fetchAll(true))
      .on("postgres_changes",{event:"*",schema:"public",table:"chicken_batches"},()=>fetchAll(true))
      .on("postgres_changes",{event:"*",schema:"public",table:"tasks"},()=>fetchAll(true))
      .on("postgres_changes",{event:"*",schema:"public",table:"financial_logs"},()=>fetchAll(true))
      .on("postgres_changes",{event:"*",schema:"public",table:"assets"},()=>fetchAll(true))
      .subscribe();
    return()=>{document.removeEventListener("visibilitychange",onVis);sb.removeChannel(ch);};
  },[fetchAll]);

  const addBatch=async f=>{const{error}=await sb.from("batches").insert({...dB({...f,createdAt:undefined}),id:uid()});if(error){showToast("Failed: "+error.message,"error");return;}setShowAddBatch(false);showToast("Crop batch saved ✓");fetchAll(true);};
  const addEvent=async f=>{const{error}=await sb.from("events").insert({...dE({...f,createdAt:undefined}),id:uid()});if(error){showToast("Failed: "+error.message,"error");return;}setShowAddEvent(false);setEvtBatchId(null);showToast("Activity logged ✓");fetchAll(true);};
  const addFertLog=async(bId,fId,name)=>{const payload={id:uid(),batch_id:bId,fert_id:parseInt(fId)||fId,name:name,date:today(),logged_by:null};const{error}=await sb.from("fert_logs").insert(payload);if(error){showToast("Failed: "+error.message,"error");return;}showToast(name+" logged ✓");fetchAll(true);};
  const addChicken=async f=>{const{error}=await sb.from("chicken_batches").insert({...dC({...f,createdAt:undefined,id:uid()})});if(error){showToast("Failed: "+error.message,"error");return;}setShowAddChicken(false);showToast("Chicken batch saved ✓");fetchAll(true);};
  const updateMortality=async(id,mortality)=>{const{error}=await sb.from("chicken_batches").update({mortality}).eq("id",id);if(error){showToast("Failed","error");return;}showToast("Updated ✓");fetchAll(true);};
  const addTask=async f=>{const payload={id:uid(),title:f.title,due_date:f.dueDate||null,priority:f.priority||"Medium",category:f.category||"General",assigned_to:f.assignedTo||null,notes:f.notes||null,completed:false,completed_date:null};const{error}=await sb.from("tasks").insert(payload);if(error){showToast("Failed: "+error.message,"error");return;}setShowAddTask(false);showToast("Task added ✓");fetchAll(true);};
  const toggleTask=async t=>{const{error}=await sb.from("tasks").update({completed:!t.completed,completed_date:!t.completed?today():null}).eq("id",t.id);if(error){showToast("Failed","error");return;}fetchAll(true);};
  const addFinance=async f=>{const payload={id:uid(),date:f.date,type:f.type,category:f.category,description:f.description||null,amount:parseFloat(f.amount),logged_by:f.logged_by||null};const{error}=await sb.from("financial_logs").insert(payload);if(error){showToast("Failed: "+error.message,"error");return;}setShowAddFinance(null);showToast((f.type==="income"?"Income":"Expense")+" logged ✓");fetchAll(true);};
  const addAsset=async f=>{const payload={id:uid(),name:f.name,category:f.category,purchase_value:parseFloat(f.purchase_value)||0,current_value:parseFloat(f.current_value)||0,purchase_date:f.purchase_date||null,condition:f.condition||"Good",serial_number:f.serial_number||null,last_serviced:f.last_serviced||null,next_service:f.next_service||null,service_notes:f.service_notes||null,notes:f.notes||null};const{error}=await sb.from("assets").insert(payload);if(error){showToast("Failed: "+error.message,"error");return;}setShowAddAsset(false);showToast("Asset saved ✓");fetchAll(true);};

  const fmtSync=()=>{if(!lastSync)return"";const m=Math.round((new Date()-lastSync)/60000);return m<1?"Just synced":m+"m ago";};
  const pendingTasks=(tasks||[]).filter(t=>!t.completed).length;

  if(loading)return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"linear-gradient(160deg,#0F3D1F,#166534)",gap:16}}>
      <div style={{fontSize:68,animation:"pulse 1.5s ease infinite"}}>🌱</div>
      <div style={{color:"#fff",fontSize:20,fontWeight:800}}>Farm Manager</div>
      <div style={{color:"rgba(255,255,255,.55)",fontSize:13}}>Ntabazinduna · Zimbabwe</div>
      <div style={{width:44,height:44,border:"3px solid rgba(255,255,255,.2)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin .8s linear infinite",marginTop:8}}/>
    </div>
  );

  return(
    <div style={{fontFamily:"system-ui,-apple-system,sans-serif",background:"#EEF5EE",minHeight:"100vh",maxWidth:480,margin:"0 auto",paddingBottom:90}}>
      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
      <div style={{background:"linear-gradient(135deg,#0F3D1F,#14532D,#166534)",color:"#fff",padding:"18px 16px 14px",boxShadow:"0 6px 24px rgba(15,61,31,.3)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontSize:9,letterSpacing:3,textTransform:"uppercase",opacity:.55,marginBottom:3}}>📍 Ntabazinduna · Zimbabwe</div>
            <div style={{fontSize:21,fontWeight:900,letterSpacing:-1}}>🌱 Farm Manager</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,.6)",marginTop:3}}>Lincoln · Thandeka · Vuyi · Velile</div>
          </div>
          <button onClick={()=>fetchAll()} style={{background:"rgba(255,255,255,.12)",border:"1px solid rgba(255,255,255,.18)",borderRadius:11,padding:"7px 12px",color:"#fff",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",gap:5}}>
            <span className={syncing?"spin":""}style={{fontSize:14}}>↻</span>
            <span style={{opacity:.8}}>{syncing?"Syncing":fmtSync()}</span>
          </button>
        </div>
      </div>
      <div style={{padding:13}}>
        {tab==="dashboard"&&<DashboardTab batches={batches} cBatches={cBatches} events={events} fertLogs={fertLogs} tasks={tasks} financialLogs={financialLogs} onAddTask={()=>setShowAddTask(true)} onToggleTask={toggleTask}/>}
        {tab==="crops"&&<CropsTab batches={batches} events={events} fertLogs={fertLogs} onAddBatch={()=>setShowAddBatch(true)} onLogEvent={id=>{setEvtBatchId(id);setShowAddEvent(true);}} onLogFert={addFertLog}/>}
        {tab==="chickens"&&<ChickensTab cBatches={cBatches} onAddBatch={()=>setShowAddChicken(true)} onUpdateMortality={updateMortality}/>}
        {tab==="finance"&&<FinanceTab financialLogs={financialLogs} assets={assets} onAddIncome={()=>setShowAddFinance("income")} onAddExpense={()=>setShowAddFinance("expense")} onAddAsset={()=>setShowAddAsset(true)}/>}
        {tab==="tasks"&&<TasksTab tasks={tasks} onAddTask={()=>setShowAddTask(true)} onToggle={toggleTask}/>}
      </div>
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"rgba(255,255,255,.94)",borderTop:"1px solid rgba(0,0,0,.07)",display:"flex",zIndex:100,boxShadow:"0 -4px 24px rgba(0,0,0,.1)",backdropFilter:"blur(12px)"}}>
        {[{key:"dashboard",icon:"📊",label:"Home"},{key:"crops",icon:"🌱",label:"Crops"},{key:"chickens",icon:"🐔",label:"Flock"},{key:"finance",icon:"💰",label:"Finance"},{key:"tasks",icon:"✅",label:"Tasks",badge:pendingTasks}].map(t=>(
          <button key={t.key} onClick={()=>setTab(t.key)} style={{flex:1,padding:"9px 0 7px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1,color:tab===t.key?"#0F3D1F":"#9CA3AF",fontWeight:tab===t.key?800:400,fontSize:9,borderTop:tab===t.key?"2.5px solid #0F3D1F":"2.5px solid transparent",position:"relative"}}>
            <span style={{fontSize:20}}>{t.icon}</span>{t.label}
            {t.badge>0&&<div style={{position:"absolute",top:5,right:"calc(50% - 18px)",width:15,height:15,borderRadius:99,background:"#DC2626",color:"#fff",fontSize:8,fontWeight:800,display:"flex",alignItems:"center",justifyContent:"center"}}>{t.badge}</div>}
          </button>
        ))}
      </div>
      {showAddBatch&&<AddBatchModal onSave={addBatch} onClose={()=>setShowAddBatch(false)}/>}
      {showAddEvent&&<AddEventModal batches={batches} defaultId={evtBatchId} onSave={addEvent} onClose={()=>{setShowAddEvent(false);setEvtBatchId(null);}}/>}
      {showAddChicken&&<AddChickenModal onSave={addChicken} onClose={()=>setShowAddChicken(false)}/>}
      {showAddTask&&<AddTaskModal onSave={addTask} onClose={()=>setShowAddTask(false)}/>}
      {showAddFinance&&<AddFinanceModal defaultType={showAddFinance} onSave={addFinance} onClose={()=>setShowAddFinance(null)}/>}
      {showAddAsset&&<AddAssetModal onSave={addAsset} onClose={()=>setShowAddAsset(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("/sw.js").catch(()=>{}));
</script>
</body>
</html>
